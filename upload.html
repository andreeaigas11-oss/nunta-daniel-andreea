    .bg-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.65) 50%, rgba(0,0,0,0.88) 100%);
      z-index: 1;
    }
    .lang-switch {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Raleway', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .lang-switch span {
      color: var(--white-muted);
      cursor: pointer;
      transition: color 0.2s;
      padding-bottom: 1px;
    }
    .lang-switch span.active {
      color: var(--white);
      border-bottom: 1px solid var(--white);
    }
    .lang-switch span:hover { color: var(--white); }
    .lang-sep { color: rgba(255,255,255,0.2) !important; cursor: default !important; }
    .card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 400px;
      padding: 3rem 2.5rem 2.5rem;
      text-align: center;
      animation: fadeUp 0.9s ease both;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    .share-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 10px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--white-faint);
      margin-bottom: 20px;
      animation: fadeUp 0.9s 0.1s ease both;
    }
    .names {
      font-family: 'Cormorant Garamond', serif;
      font-size: 48px;
      font-weight: 300;
      font-style: italic;
      color: var(--white);
      line-height: 1.15;
      animation: fadeUp 0.9s 0.15s ease both;
    }
    .amp { font-size: 34px; color: rgba(255,255,255,0.45); }
    .date {
      font-family: 'Raleway', sans-serif;
      font-size: 9px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--white-muted);
      margin-top: 10px;
      margin-bottom: 22px;
      animation: fadeUp 0.9s 0.2s ease both;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      animation: fadeUp 0.9s 0.25s ease both;
    }
    .divider-line { flex: 1; height: 0.5px; background: var(--white-line); }
    .divider-ornament { font-family: 'Cormorant Garamond', serif; color: rgba(255,255,255,0.22); font-size: 12px; }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      animation: fadeUp 0.9s 0.3s ease both;
    }
    .btn {
      width: 100%;
      padding: 15px 20px;
      font-family: 'Raleway', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s ease;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: transparent;
      border: none;
      color: var(--white);
    }
    .btn-primary { border: 1px solid var(--white-border); color: var(--white); }
    .btn-primary:hover { background: rgba(255,255,255,0.1); }
    .btn-secondary { border: 1px solid var(--white-border-soft); color: var(--white-muted); }
    .btn-secondary:hover { background: rgba(255,255,255,0.06); color: var(--white); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    /* Upload area */
    .upload-area { display: none; flex-direction: column; gap: 12px; width: 100%; }
    .upload-area.visible { display: flex; }
    .drop-zone {
      position: relative;
      width: 100%;
      border: 1px dashed rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.05);
      padding: 28px 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      overflow: hidden;
      text-align: center;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.08);
    }
    .drop-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px;
      font-style: italic;
      color: var(--white);
      display: block;
      margin-bottom: 5px;
      pointer-events: none;
    }
    .drop-hint {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--white-muted);
      pointer-events: none;
    }
    .upload-input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      font-size: 0;
    }
    .progress-wrap { width: 100%; display: none; }
    .progress-bar-bg { width: 100%; height: 1px; background: rgba(255,255,255,0.15); overflow: hidden; }
    .progress-bar-fill { height: 100%; background: var(--white); width: 0%; transition: width 0.4s ease; }
    .progress-label { font-size: 10px; letter-spacing: 2px; color: var(--white-muted); margin-top: 10px; text-align: center; font-family: 'Raleway', sans-serif; }
    .status-msg { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-style: italic; color: var(--white); display: none; }
    .status-msg.success { color: rgba(180,220,160,0.9); }
    .status-msg.error { color: rgba(220,120,120,0.9); }
    @media (max-width: 480px) {
      .card { padding: 2.5rem 1.5rem 2rem; }
      .names { font-size: 38px; }
    }
  </style>
</head>

      </a>
    </div>

    <div class="upload-area" id="uploadArea">
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" class="upload-input" accept="image/*,video/*" multiple />
        <span class="drop-text" data-ro="Apasă pentru a selecta" data-en="Tap to select">Apasă pentru a selecta</span>
        <span class="drop-hint" data-ro="poze sau video" data-en="photos or videos">poze sau video</span>
      </div>
      <button class="btn btn-primary" id="confirmBtn" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span id="confirmLabel" data-ro="Selectează fișiere" data-en="Select files">Selectează fișiere</span>
      </button>
      <button class="btn btn-secondary" id="btnBack">
        <span data-ro="← Înapoi" data-en="← Back">← Înapoi</span>
      </button>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
        <div class="progress-label" id="progressLabel"></div>
      </div>
      <div class="status-msg" id="statusMsg"></div>
    </div>
  </main>

  <script>
    const CLOUD_NAME = 'dv4ouytoh';
    const UPLOAD_PRESET = 'dd.wedding';
    const SUPABASE_URL = 'https://tkjgsuiocutuiuwxxinc.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_ljMEAbOM6vpozsCgV6b-eg_LH9aQbOF';

    // Language
    let currentLang = 'ro';
    function setLang(lang) {
      currentLang = lang;
      document.querySelectorAll('.lang-switch span[data-lang]').forEach(s => {
        s.classList.toggle('active', s.dataset.lang === lang);
      });
      document.querySelectorAll('[data-' + lang + ']').forEach(el => {
        el.textContent = el.dataset[lang];
      });
    }

    const actions     = document.getElementById('actions');
    const uploadArea  = document.getElementById('uploadArea');
    const btnUpload   = document.getElementById('btnUpload');
    const btnBack     = document.getElementById('btnBack');
    const fileInput   = document.getElementById('fileInput');
    const dropZone    = document.getElementById('dropZone');
    const confirmBtn  = document.getElementById('confirmBtn');
    const confirmLabel= document.getElementById('confirmLabel');
    const progressWrap= document.getElementById('progressWrap');
    const progressFill= document.getElementById('progressFill');
    const progressLabel=document.getElementById('progressLabel');
    const statusMsg   = document.getElementById('statusMsg');

    let selectedFiles = [];

    btnUpload.addEventListener('click', () => {
      actions.style.display = 'none';
      uploadArea.classList.add('visible');
    });

    btnBack.addEventListener('click', () => {
      uploadArea.classList.remove('visible');
      actions.style.display = 'flex';
      reset();
    });

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      setFiles(Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/') || f.type.startsWith('video/')));
    });
    fileInput.addEventListener('change', () => setFiles(Array.from(fileInput.files)));

    function setFiles(files) {
      if (!files.length) return;
      selectedFiles = files;
      confirmBtn.disabled = false;
      const n = files.length;
      const roLabel = n === 1 ? 'Încarcă 1 fișier' : 'Încarcă ' + n + ' fișiere';
      const enLabel = n === 1 ? 'Upload 1 file' : 'Upload ' + n + ' files';
      confirmLabel.dataset.ro = roLabel;
      confirmLabel.dataset.en = enLabel;
      confirmLabel.textContent = currentLang === 'en' ? enLabel : roLabel;
      const dropText = dropZone.querySelector('.drop-text');
      dropText.dataset.ro = n === 1 ? '1 fișier selectat ✦' : n + ' fișiere selectate ✦';
      dropText.dataset.en = n === 1 ? '1 file selected ✦' : n + ' files selected ✦';
      dropText.textContent = currentLang === 'en' ? dropText.dataset.en : dropText.dataset.ro;
    }

    confirmBtn.addEventListener('click', () => handleUpload(selectedFiles));

    async function handleUpload(files) {
      if (!files.length) return;
      confirmBtn.disabled = true;
      btnBack.style.display = 'none';
      dropZone.style.pointerEvents = 'none';
      progressWrap.style.display = 'block';
      statusMsg.style.display = 'none';
      progressFill.style.width = '0%';

      let uploaded = 0, failed = 0;

      for (let i = 0; i < files.length; i++) {
        progressLabel.textContent = (currentLang === 'en' ? 'Uploading ' : 'Se încarcă ') + (i + 1) + ' / ' + files.length + '...';
        progressFill.style.width = ((i / files.length) * 100) + '%';

        try {
          const isVideo = files[i].type.startsWith('video/');
          const preset = isVideo ? 'dd.wedding.video' : UPLOAD_PRESET;
          const resourceType = isVideo ? 'video' : 'image';

          const formData = new FormData();
          formData.append('file', files[i]);
          formData.append('upload_preset', preset);
          formData.append('folder', 'nunta-daniel-andreea');

          const res = await fetch('https://api.cloudinary.com/v1_1/' + CLOUD_NAME + '/' + resourceType + '/upload', { method: 'POST', body: formData });
          if (!res.ok) throw new Error('upload failed');
          const data = await res.json();

          await fetch(SUPABASE_URL + '/rest/v1/photos', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'apikey': SUPABASE_KEY,
              'Authorization': 'Bearer ' + SUPABASE_KEY,
              'Prefer': 'return=minimal'
            },
            body: JSON.stringify({ url: data.secure_url })
          });
          uploaded++;
        } catch(e) { console.error(e); failed++; }
      }

      progressFill.style.width = '100%';
      setTimeout(() => { progressWrap.style.display = 'none'; }, 600);
      confirmBtn.disabled = false;
      btnBack.style.display = '';
      dropZone.style.pointerEvents = 'auto';
      fileInput.value = '';
      reset();

      statusMsg.style.display = 'block';
      if (failed === 0) {
        statusMsg.className = 'status-msg success';
        statusMsg.textContent = currentLang === 'en'
          ? (uploaded === 1 ? 'File uploaded! ✦' : uploaded + ' files uploaded! ✦')
          : (uploaded === 1 ? 'Fișierul a fost încărcat! ✦' : uploaded + ' fișiere încărcate! ✦');
      } else if (uploaded > 0) {
        statusMsg.className = 'status-msg';
        statusMsg.textContent = uploaded + (currentLang === 'en' ? ' uploaded, ' : ' încărcate, ') + failed + (currentLang === 'en' ? ' failed.' : ' au eșuat.');
      } else {
        statusMsg.className = 'status-msg error';
        statusMsg.textContent = currentLang === 'en' ? 'Something went wrong. Try again.' : 'Ceva nu a mers. Încearcă din nou.';
      }
    }

    function reset() {
      selectedFiles = [];
      confirmBtn.disabled = true;
      const roLabel = 'Selectează fișiere';
      const enLabel = 'Select files';
      confirmLabel.dataset.ro = roLabel;
      confirmLabel.dataset.en = enLabel;
      confirmLabel.textContent = currentLang === 'en' ? enLabel : roLabel;
      const dropText = dropZone.querySelector('.drop-text');
      dropText.dataset.ro = 'Apasă pentru a selecta';
      dropText.dataset.en = 'Tap to select';
      dropText.textContent = currentLang === 'en' ? 'Tap to select' : 'Apasă pentru a selecta';
    }
  </script>
</body>
</html>
