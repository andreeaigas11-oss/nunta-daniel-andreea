<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daniel & Andreea — Albumul Nunții</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: #fff;
      color: #111;
    }

    body {
      font-family: 'Raleway', sans-serif;
      min-height: 100vh;
      padding: 0 0 4rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Header */
    .header {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 3rem 1rem 2rem;
      max-width: 700px;
      margin: 0 auto;
      animation: fadeUp 0.9s ease both;
    }

    .names {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      font-weight: 300;
      font-style: italic;
      color: #111;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .ampersand { font-size: 32px; color: rgba(0,0,0,0.25); }

    .subtitle {
      font-size: 10px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: rgba(0,0,0,0.4);
      margin-bottom: 20px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 260px;
      margin: 0 auto 20px;
    }

    .divider-line { flex: 1; height: 0.5px; background: rgba(0,0,0,0.15); }
    .divider-ornament { color: rgba(0,0,0,0.2); font-size: 12px; font-family: 'Cormorant Garamond', serif; }

    .header-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      border: 1px solid rgba(0,0,0,0.2);
      background: transparent;
      color: rgba(0,0,0,0.5);
      font-family: 'Raleway', sans-serif;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.25s ease;
    }

    .back-btn:hover {
      border-color: rgba(0,0,0,0.5);
      color: #111;
      background: rgba(0,0,0,0.04);
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(0,0,0,0.35);
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(140,200,120,0.9);
      animation: pulse 2s infinite;
    }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

    /* Photo count */
    .photo-count {
      position: relative;
      z-index: 2;
      text-align: center;
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(0,0,0,0.3);
      margin-bottom: 1.5rem;
    }

    /* Loading / empty states */
    .loading, .empty {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 3rem 1rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-style: italic;
      color: rgba(0,0,0,0.3);
    }

    /* Grid */
    .grid {
      position: relative;
      z-index: 2;
      max-width: 960px;
      margin: 0 auto;
      padding: 0 10px;
      columns: 3 200px;
      column-gap: 8px;
    }

    .grid-item {
      break-inside: avoid;
      margin-bottom: 8px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }

    .grid-item img,
    .grid-item video {
      width: 100%;
      display: block;
      transition: transform 0.4s ease, opacity 0.3s ease;
      opacity: 1;
    }

    .grid-item:hover img,
    .grid-item:hover video {
      transform: scale(1.03);
      opacity: 1;
    }

    .grid-item.new-photo { animation: popIn 0.5s ease both; }
    @keyframes popIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }

    /* Video badge */
    .video-badge {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.5);
      color: rgba(255,255,255,0.9);
      font-size: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 3px 7px;
      font-family: 'Raleway', sans-serif;
      pointer-events: none;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .lightbox.open { display: flex; }

    .lightbox img,
    .lightbox video {
      max-width: 90vw;
      max-height: 88vh;
      object-fit: contain;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 24px;
      color: rgba(255,255,255,0.5);
      font-size: 28px;
      cursor: pointer;
      transition: color 0.2s;
      line-height: 1;
    }

    .lightbox-close:hover { color: #fff; }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 40px;
      cursor: pointer;
      padding: 0 16px;
      transition: color 0.2s;
      user-select: none;
      line-height: 1;
    }

    .lightbox-nav:hover { color: #fff; }
    .lightbox-prev { left: 4px; }
    .lightbox-next { right: 4px; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 500px) {
      .names { font-size: 32px; }
      .grid { columns: 2 130px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="names">Daniel <span class="ampersand">&</span> Andreea</div>
    <div class="subtitle">Albumul Nunții — 04 Iulie 2026</div>
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-ornament">✦</span>
      <div class="divider-line"></div>
    </div>
    <div class="header-actions">
      <a class="back-btn" href="upload.html">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Încarcă
      </a>
      <div class="live-badge"><span class="live-dot"></span> Live</div>
    </div>
  </div>

  <div class="loading" id="loading">Se încarcă albumul...</div>
  <div class="empty" id="empty" style="display:none;">Albumul este încă gol — fii primul care adaugă o amintire</div>
  <div class="photo-count" id="photoCount" style="display:none;"></div>
  <div class="grid" id="grid"></div>

  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" id="lbClose">×</span>
    <span class="lightbox-nav lightbox-prev" id="lbPrev">‹</span>
    <img src="" id="lbImg" alt="poză nuntă" style="display:none;" />
    <video id="lbVideo" controls style="display:none;max-width:90vw;max-height:88vh;"></video>
    <span class="lightbox-nav lightbox-next" id="lbNext">›</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://tkjgsuiocutuiuwxxinc.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_ljMEAbOM6vpozsCgV6b-eg_LH9aQbOF';

    const { createClient } = supabase;
    const client = createClient(SUPABASE_URL, SUPABASE_KEY);

    const loading    = document.getElementById('loading');
    const empty      = document.getElementById('empty');
    const photoCount = document.getElementById('photoCount');
    const grid       = document.getElementById('grid');
    const lightbox   = document.getElementById('lightbox');
    const lbImg      = document.getElementById('lbImg');
    const lbVideo    = document.getElementById('lbVideo');
    const lbClose    = document.getElementById('lbClose');
    const lbPrev     = document.getElementById('lbPrev');
    const lbNext     = document.getElementById('lbNext');

    let images = [];
    let currentIndex = 0;

    function isVideo(url) {
      return /\.(mp4|mov|avi|webm|mkv)(\?|$)/i.test(url) || url.includes('/video/upload/');
    }

    async function loadPhotos() {
      const { data, error } = await client.from('photos').select('*').order('id', { ascending: false });
      loading.style.display = 'none';
      if (error) {
        loading.innerHTML = '<span style="color:rgba(220,100,100,0.8);font-style:italic;">Eroare la încărcare. Încearcă din nou.</span>';
        loading.style.display = 'block';
        return;
      }
      images = data || [];
      if (images.length === 0) { empty.style.display = 'block'; return; }
      images.forEach((photo, idx) => grid.appendChild(createItem(photo.url, idx, false)));
      updateCount();
    }

    client.channel('photos-channel')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'photos' }, payload => {
        const photo = payload.new;
        images.unshift(photo);
        const item = createItem(photo.url, 0, true);
        grid.insertBefore(item, grid.firstChild);
        empty.style.display = 'none';
        updateCount();
      })
      .subscribe();

    function createItem(url, idx, isNew) {
      const item = document.createElement('div');
      item.className = 'grid-item' + (isNew ? ' new-photo' : '');

      if (isVideo(url)) {
        const video = document.createElement('video');
        video.src = url;
        video.muted = true;
        video.playsInline = true;
        video.preload = 'metadata';
        item.appendChild(video);
        const badge = document.createElement('div');
        badge.className = 'video-badge';
        badge.textContent = 'video';
        item.appendChild(badge);
      } else {
        const img = document.createElement('img');
        img.src = url;
        img.alt = 'poză nuntă';
        img.loading = 'lazy';
        item.appendChild(img);
      }

      item.addEventListener('click', () => openLightbox(idx));
      return item;
    }

    function updateCount() {
      const count = grid.querySelectorAll('.grid-item').length;
      if (count > 0) {
        photoCount.style.display = 'block';
        photoCount.textContent = count + (count === 1 ? ' fotografie' : ' fotografii');
      }
    }

    function openLightbox(idx) {
      currentIndex = idx;
      const url = images[idx].url;
      if (isVideo(url)) {
        lbImg.style.display = 'none';
        lbVideo.style.display = 'block';
        lbVideo.src = url;
        lbVideo.play();
      } else {
        lbVideo.style.display = 'none';
        lbVideo.pause();
        lbVideo.src = '';
        lbImg.style.display = 'block';
        lbImg.src = url;
      }
      lightbox.classList.add('open');
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      lbVideo.pause();
      lbVideo.src = '';
    }

    lbClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    lbPrev.addEventListener('click', e => {
      e.stopPropagation();
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      openLightbox(currentIndex);
    });
    lbNext.addEventListener('click', e => {
      e.stopPropagation();
      currentIndex = (currentIndex + 1) % images.length;
      openLightbox(currentIndex);
    });
    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') { currentIndex = (currentIndex - 1 + images.length) % images.length; openLightbox(currentIndex); }
      if (e.key === 'ArrowRight') { currentIndex = (currentIndex + 1) % images.length; openLightbox(currentIndex); }
    });

    loadPhotos();
  </script>
</body>
</html>
